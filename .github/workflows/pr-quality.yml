name: PR Quality

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24.10.0"
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    outputs:
      coverage_available: ${{ steps.coverage_status.outputs.available }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Run typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck

      - name: Run tests
        id: test
        continue-on-error: true
        run: npm run test

      - name: Check coverage report
        if: ${{ always() }}
        id: coverage_status
        shell: bash
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn

      - name: Upload coverage to Codecov
        if: ${{ always() && env.CODECOV_TOKEN != '' && steps.coverage_status.outputs.available == 'true' }}
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: unit
          name: pr-quality
          fail_ci_if_error: true
          verbose: true
          token: ${{ env.CODECOV_TOKEN }}

      - name: Fail job when validation fails
        if: ${{ always() }}
        shell: bash
        run: |
          failed=0

          if [[ "${{ steps.lint.outcome }}" == "failure" ]]; then
            echo "Lint failed."
            failed=1
          fi

          if [[ "${{ steps.typecheck.outcome }}" == "failure" ]]; then
            echo "Typecheck failed."
            failed=1
          fi

          if [[ "${{ steps.test.outcome }}" == "failure" ]]; then
            echo "Tests failed."
            failed=1
          fi

          exit "${failed}"

  build:
    name: Build
    runs-on: ubuntu-latest
    if: ${{ always() && needs.test.result != 'cancelled' }}
    needs:
      - test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    if: ${{ always() && needs.test.result != 'cancelled' }}
    needs:
      - test

    steps:
      - name: Skip when SonarQube secrets are not configured
        if: ${{ env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == '' }}
        run: echo "Skipping SonarQube because SONAR_TOKEN or SONAR_HOST_URL is not configured."

      - name: Checkout repository
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && needs.test.outputs.coverage_available == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: coverage-lcov
          path: coverage

      - name: Skip coverage download when report is unavailable
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && needs.test.outputs.coverage_available != 'true' }}
        run: echo "Skipping coverage download because coverage/lcov.info was not produced."

      - name: Set up Java
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache SonarQube packages
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          
      - name: SonarQube Quality Gate check
        id: sonarqube_quality_gate
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        continue-on-error: true
        uses: SonarSource/sonarqube-quality-gate-action@master
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: Print SonarQube result
        if: ${{ always() && env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        shell: bash
        run: |
          status="${{ steps.sonarqube_quality_gate.outputs.quality-gate-status }}"
          
          cat << 'EOF'
          [QUALITY GATE] Checking NEW CODE conditions...
          - FAIL IF: New Code Issues > 5
          - FAIL IF: New Code Security Hotspots Reviewed < 100%
          - FAIL IF: New Code Coverage < 60.0%
          - FAIL IF: New Code Duplicated Lines > 3.0%

          [QUALITY GATE] Checking OVERALL CODE conditions...
          - FAIL IF: Overall High Severity Issues > 1
          - FAIL IF: Overall Medium Severity Issues > 4
          EOF

          if [[ -z "${status}" ]]; then
            status="UNKNOWN"
          fi

          echo "Quality Gate = ${status}"

      - name: Fail job when SonarQube quality gate fails
        if: ${{ always() && env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && steps.sonarqube_quality_gate.outcome == 'failure' }}
        shell: bash
        run: |
          echo "SonarQube Quality Gate failed."
          exit 1
