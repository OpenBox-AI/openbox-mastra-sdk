name: PR Quality

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
  push:
    branches:
      - main
      - develop
      - 'fix/**'
      - 'feat/**'
      - 'hotfix/**'
      - 'release/**'
      - 'docs/**'

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24.10.0"
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    outputs:
      coverage_available: ${{ steps.coverage_status.outputs.available }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Run typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck

      - name: Run tests
        id: test
        continue-on-error: true
        run: npm run test

      - name: Check coverage report
        if: ${{ always() }}
        id: coverage_status
        shell: bash
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn

      - name: Upload coverage to Codecov
        if: ${{ always() && env.CODECOV_TOKEN != '' && steps.coverage_status.outputs.available == 'true' }}
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: unit
          name: pr-quality
          fail_ci_if_error: true
          verbose: true
          token: ${{ env.CODECOV_TOKEN }}

      - name: Fail job when validation fails
        if: ${{ always() }}
        shell: bash
        run: |
          failed=0

          if [[ "${{ steps.lint.outcome }}" == "failure" ]]; then
            echo "Lint failed."
            failed=1
          fi

          if [[ "${{ steps.typecheck.outcome }}" == "failure" ]]; then
            echo "Typecheck failed."
            failed=1
          fi

          if [[ "${{ steps.test.outcome }}" == "failure" ]]; then
            echo "Tests failed."
            failed=1
          fi

          exit "${failed}"

  build:
    name: Build
    runs-on: ubuntu-latest
    if: ${{ always() && needs.test.result != 'cancelled' }}
    needs:
      - test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

  datadog-security-scan:
    name: Datadog Security Scan
    if: ${{ always() }}
    needs: 
      - test
      - build
    uses: OpenBox-AI/common-pipeline/.github/workflows/datadog-security.yml@main
    secrets:
      DD_API_KEY: ${{ secrets.DD_API_KEY }}
      DD_APP_KEY: ${{ secrets.DD_APP_KEY }}