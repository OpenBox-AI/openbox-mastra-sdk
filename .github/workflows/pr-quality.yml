name: PR Quality

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24.10.0"
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    outputs:
      coverage_available: ${{ steps.coverage_status.outputs.available }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        id: lint
        run: npm run lint

      - name: Run typecheck
        id: typecheck
        run: npm run typecheck

      - name: Run tests
        id: test
        continue-on-error: true
        run: npm run test

      - name: Check coverage report
        if: ${{ always() }}
        id: coverage_status
        shell: bash
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn

      - name: Upload coverage to Codecov
        if: ${{ always() && env.CODECOV_TOKEN != '' && steps.coverage_status.outputs.available == 'true' }}
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: unit
          name: pr-quality
          fail_ci_if_error: true
          verbose: true
          token: ${{ env.CODECOV_TOKEN }}

      - name: Run build
        id: build
        if: ${{ always() }}
        run: npm run build

      - name: Verify package tarball
        id: pack
        if: ${{ always() }}
        run: npm run pack:check

      - name: Fail job when validation fails
        if: ${{ always() }}
        shell: bash
        run: |
          failed=0

          if [[ "${{ steps.test.outcome }}" == "failure" ]]; then
            echo "Tests failed."
            failed=1
          fi

          if [[ "${{ steps.build.outcome }}" == "failure" ]]; then
            echo "Build failed."
            failed=1
          fi

          if [[ "${{ steps.pack.outcome }}" == "failure" ]]; then
            echo "Package verification failed."
            failed=1
          fi

          exit "${failed}"

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    if: ${{ always() && needs.quality.result != 'cancelled' }}
    needs:
      - quality

    steps:
      - name: Skip when SonarQube secrets are not configured
        if: ${{ env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == '' }}
        run: echo "Skipping SonarQube because SONAR_TOKEN or SONAR_HOST_URL is not configured."

      - name: Checkout repository
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage report
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && needs.quality.outputs.coverage_available == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: coverage-lcov
          path: coverage

      - name: Skip coverage download when report is unavailable
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && needs.quality.outputs.coverage_available != 'true' }}
        run: echo "Skipping coverage download because coverage/lcov.info was not produced."

      - name: Set up Java
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache SonarQube packages
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
