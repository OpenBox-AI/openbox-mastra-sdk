name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.10.0
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate
        run: npm run ci:check

      - name: Verify Package Tarball
        run: npm run pack:check
