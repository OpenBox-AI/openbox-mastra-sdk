name: Release

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24.10.0"
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  GITLEAKS_VERSION: "8.30.0"

jobs:
  release-governance:
    name: Release Governance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag format
        env:
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          pattern='^[0-9]+\.[0-9]+\.[0-9]+$'
          if [[ ! "${TAG_NAME}" =~ ${pattern} ]]; then
            echo "Invalid release tag: ${TAG_NAME}"
            echo "Expected format: <major>.<minor>.<patch>"
            exit 1
          fi

      - name: Verify governance files exist
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            ".github/CODEOWNERS"
            ".gitleaks.toml"
            "CODE_OF_CONDUCT.md"
            "LICENSE"
            "SECURITY.md"
            "package.json"
            "package-lock.json"
            "sonar-project.properties"
          )
          for file in "${required_files[@]}"; do
            if [ ! -f "${file}" ]; then
              echo "Missing required governance file: ${file}"
              exit 1
            fi
          done

      - name: Verify CODEOWNERS coverage for protected files
        shell: bash
        run: |
          set -euo pipefail
          declare -a required_patterns=(
            "/.github/workflows/"
            "/.github/CODEOWNERS"
            "/.gitleaks.toml"
            "/CODE_OF_CONDUCT.md"
            "/LICENSE"
            "/SECURITY.md"
            "/package.json"
            "/package-lock.json"
            "/sonar-project.properties"
          )
          for pattern in "${required_patterns[@]}"; do
            if ! awk '!/^#/ && NF >= 2 {print $1}' .github/CODEOWNERS | grep -Fxq "${pattern}"; then
              echo "Missing CODEOWNERS entry: ${pattern}"
              exit 1
            fi
          done

  release-quality:
    name: Release Quality
    runs-on: ubuntu-latest
    needs:
      - release-governance

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI validation
        run: npm run ci:check

      - name: Verify package tarball
        run: npm run pack:check

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: release-coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error

  datadog-security-scan:
    name: Datadog Security Scan
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - release-governance
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Datadog Software Composition Analysis
        id: datadog-software-composition-analysis
        uses: DataDog/datadog-sca-github-action@main
        with:
          dd_api_key: ${{ secrets.DD_API_KEY }}
          dd_app_key: ${{ secrets.DD_APP_KEY }}
          dd_site: ${{ secrets.DD_SITE }}


      - name: Datadog Static Analysis & Secret Scanning
        id: datadog-static-analysis
        uses: DataDog/datadog-static-analyzer-github-action@v3
        with:
          dd_api_key: ${{ secrets.DD_API_KEY }}
          dd_app_key: ${{ secrets.DD_APP_KEY }}
          dd_site: ${{ secrets.DD_SITE }}
          secrets_enabled: true
          static_analysis_enabled: true
          cpu_count: 2

  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    environment: release
    needs:
      - release-governance
      - release-quality
      - datadog-security-scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          set -euo pipefail
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        env:
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${TAG_NAME}" != "${{ steps.package.outputs.version }}" ]; then
            echo "Tag version (${TAG_NAME}) does not match package.json version (${{ steps.package.outputs.version }})"
            exit 1
          fi

      - name: Read published npm version
        id: npm
        shell: bash
        run: |
          set -euo pipefail
          published_version="$(npm view "${{ steps.package.outputs.name }}" version 2>/dev/null || true)"
          echo "published_version=${published_version}" >> "$GITHUB_OUTPUT"

      - name: Check GitHub release
        id: github_release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if version already published
        if: steps.package.outputs.version == steps.npm.outputs.published_version
        run: echo "Version ${{ steps.package.outputs.version }} is already published. Skipping release."

      - name: Publish to npm
        if: steps.package.outputs.version != steps.npm.outputs.published_version
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: steps.github_release.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
